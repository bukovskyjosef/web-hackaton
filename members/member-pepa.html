      <p>Narodil se do rodiny sovětského důstojníka, který se snažil od malička svému synovi vštípit lásku k
        tradičnímu hudebnímu nástroji domoviny – ballallajce. To se mu podařilo i díky tomu, že malý Pepíček musel
        každé ráno vítat hlasitým vykřikováním názvu tohoto trojhranného nástroje. Když se Pepíček dostal mezi jiné
        děti než důstojnické, objevil západní komiksy a přezdívka byla na světě.</p>
      <p>Co si rovněž odnesl do života je láska k pochodovým písním. Talent projevoval už v útlém věku, kdy si maminka
        všimla, že rovná kočárky do vozové hradby a pobrukuje si „Přes spáleniště, přes krvavé řeky…". Proto i dnes,
        po letech, je jeho přednes úderný a rázný a posluchače bezděky nutí rovnat záda a dělat vpravo hleď.</p>
