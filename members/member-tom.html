      <img class="member-photo" src="/members-photo/tomas.jpg" alt="Tomáš" />
      <p>S muzikou laškoval jako student a mladý dělnický kádr, od klasické kytary odešel k táboráku a pak na dlouhou
        dobu šla kytara do skříně. Okolo roku 2008 ho přivedl zpět ke hraní Standa Kašný, se kterým se od té doby
        prokousává od domácích dýchánků až k veřejným vystoupením. Cestou ho zvědavost přiměla osahat si i další
        brnkací nástroje, aby nakonec zakotvil u basové kytary. V roce 2019 naskočil do kapely The Deadliners, se
        kterou hráli cover verze převážně rockových pecek, dokud je okolnosti nerozfoukaly v roce 2022 po světě. Velmi
        ho ovlivnilo setkání s vynikajícím kytaristou Milanem Kramarovičem v Rockové škole v roce 2022, který ho
        požádal o doplnění školní kapely. Několik společných zkoušek vyvrcholilo vánočním jazzovým improvizačním
        večerem, na kterém se setkali opět se Standou Kašným.</p>
