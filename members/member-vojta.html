      <p>Malý Vojta své okolí dokonale šokoval, když si z Lega postavil své první varhany, ještě mu nebylo ani tři. V
        pěti je přestavěl na čtvrttónové a v šesti, jakmile pochopil základy matematiky, začal vybírat vstupné. Rodina
        si díky tomu mohla dovolit ho poslat studovat na prestižní školu Strýčka Jedličky. Tam zvítězil v soutěži v
        přednesu, se zvláštním uznáním za schopnost každou sloku pokaždé zahrát jinak. Tuto svoji přednost pak v
        současné době využívá při hraní s Hackatónem.</p>
      <p>Jeho specialitou jsou svatební a pohřební marše. Díky nim se také seznámil se Šmoullou. Jeho citlivý sluch
        vycítí na desítky kilometrů, když se někde v okolí plánuje svatba nebo pohřeb. Šťastní budoucí manželé,
        případně budoucí šťastní pozůstalí, pak od Vojty dostanou vždy čerstvou nabídku hudebního doprovodu plánované
        akce.</p>
