<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propojení Obrázků s Názvy</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100%;
            margin: 0;
            flex-direction: column;
            
        }
        .stats {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .container {
            width: 100vw;
            display: flex;
        }
        .images, .labels {
            display: flex;
            flex-wrap: wrap;
           
            gap: 10px;

            margin-right: 20px;
        }
        .label-item {
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
        }
        .image-item, .label-item {
            margin: 1px;
            border: 2px solid #333;
            padding: 1px;
            text-align: center;
            transition: border-color 0.3s;
            box-sizing: border-box;
            width: 200px;
            height: 200px;
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .highlight {
            background-color: #e0e0e0;
        }
        .correct {
            border-color: green;
        }
    </style>
</head>
<body>
    <p>Nejprve klikněte na název písně vlevo a poté klikněte na obrázek, který k názvu patří.</p>
    <div class="stats">
        <span>Správně: <span id="correctCount">0</span></span> | 
        <span>Špatně: <span id="wrongCount">0</span></span>
    </div>
    <div class="container">
        <div class="labels">
            <!-- Sem umístíme názvy -->
        </div>
        <div class="images">
            <!-- Sem umístíme obrázky -->
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
